spring:
  datasource:
    url: jdbc:mysql://localhost:3306/guild_manager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: guilduser
    password: guildpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: GuildManagerSecretKey2024TFGDamMuyLargaYSeguraParaHS256
  expiration-ms: 86400000

server:
  port: 8080

guild-manager:
  gacha:
    coste-x1: 100
    coste-x10: 900
  aventura:
    duracion-base-segundos: 60

logging:
  level:
    com.guildmanager: DEBUG
    org.springframework.security: DEBUG
